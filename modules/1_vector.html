<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>SDTEST® Модуль 1</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #eef2f3;
            margin: 0;
            padding-bottom: 50px;
        }

        /* Шапка курса */
        header {
            background: #2c3e50;
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-text {
            font-weight: bold;
            font-size: 20px;
            letter-spacing: 1px;
        }

        /* Контент */
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            background: #3498db;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
    </style>
    <script src="../js/state_manager.js"></script>
</head>

<body>

    <header>
        <div class="logo-container">
            <img src="../assets/sdtest_logo.png" alt="Logo" style="height: 40px; border-radius: 50%;">
            <div class="logo-text">SD-MDP | Слой 1: Поведение</div>
        </div>
        <nav><a href="../index.html" style="color: white; text-decoration: none;">Навигатор</a></nav>
    </header>

    <div class="container">
        <h1>Слой 1: Поведение</h1>
        <p>Анализ видимых индикаторов (Опросы 1, 2, 10)</p>

        <label>Дисциплина (опрос 1):</label>
        <input type="number" id="poll1" step="0.1" value="0.5">

        <label>Результативность (опрос 2):</label>
        <input type="number" id="poll2" step="0.1" value="0.5">

        <button onclick="diagnose()">Анализировать</button>
        <div id="result" style="margin-top:20px; padding:15px; border-radius:5px; background: #f8f9fa;"></div>
    </div>

    <script>
        function diagnose() {
            let p1 = parseFloat(document.getElementById('poll1').value);
            let p2 = parseFloat(document.getElementById('poll2').value);
            let res = document.getElementById('result');
            console.log('SD-Navigator: Сохраняю значение:', document.getElementById('poll1').value);
            localStorage.setItem('poll1', document.getElementById('poll1').value);
            StateManager.save('poll1', document.getElementById('poll1').value);
            res.innerText = (p1 > 0.8) ? "Диагноз: Стабильное поведение." : "Диагноз: Требуется углубленный анализ.";
            setTimeout(function() {
                window.location.href = '../simulation.html';
            }, 500); // Задержка 500мс для надежности записи
        }
    </script>
</body>

</html>
